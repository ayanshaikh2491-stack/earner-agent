name: 🤖 Earner Agent - 24/7 Autonomous Earning

on:
  schedule:
    # Har 2 ghante — 24/7 free
    - cron: '0 */2 * * *'
  workflow_dispatch:  # Manual trigger bhi

jobs:
  earn:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🔧 Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: 📦 Install uv
        run: |
          pip install uv
          uv sync

      - name: 💰 Run Earner Agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          uv run python earner_gh.py

      - name: 📊 Save Earnings Report
        run: |
          mkdir -p reports
          echo "## Earnings Report - $(date)" > reports/latest.md
          echo "" >> reports/latest.md
          echo "- Run time: $(date)" >> reports/latest.md
          echo "- Agent output: See logs" >> reports/latest.md

      - name: 📤 Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: earnings-$(date +%Y%m%d-%H%M)
          path: reports/
          retention-days: 7

      - name: 📝 Commit Findings (if any)
        run: |
          git config --local user.email "earner-bot@users.noreply.github.com"
          git config --local user.name "Earner Bot"
          git add reports/ workspace/ memory/ -A 2>/dev/null || true
          git diff --staged --quiet || git commit -m "🤖 Auto earnings update $(date +%Y-%m-%d)"
          git push 2>/dev/null || echo "Nothing new to commit"
